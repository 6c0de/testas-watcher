name: Keepalive Heartbeat

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update heartbeat timestamp and commit
        run: |
          date -u +"Last heartbeat: %Y-%m-%dT%H:%M:%SZ" > HEARTBEAT.md
          git config user.name "testas-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add HEARTBEAT.md
          git commit -m "chore: heartbeat commit to keep scheduled workflow active" || exit 0
          git push
